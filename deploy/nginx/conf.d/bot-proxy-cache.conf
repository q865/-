# Include from /etc/nginx/conf.d/ (http context).
# Microcache HTML for search bots to avoid Vercel cold-start timeouts in Yandex Webmaster.

proxy_cache_path /var/cache/nginx/bot_html
  levels=1:2
  keys_zone=bot_html:10m
  max_size=64m
  inactive=10m
  use_temp_path=off;

# 0 = cache allowed for this UA; 1 = bypass cache (humans / unknown)
map $http_user_agent $bot_cache_bypass {
    default                                                 1;
    ~*(?i)(Googlebot|YandexBot|YandexWebmaster|YandexImages|bingbot) 0;
}
