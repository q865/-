# HTTP-only proxy до certbot. VPS → Vercel
# Host: air-cloud-msk.vercel.app (иначе 403 от Vercel)

resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
resolver_timeout 5s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name air-cloud-msk.ru www.air-cloud-msk.ru;

    client_max_body_size 10M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        set $upstream air-cloud-msk.vercel.app;
        proxy_pass https://$upstream;
        proxy_ssl_server_name on;
        proxy_ssl_name air-cloud-msk.vercel.app;
        proxy_http_version 1.1;
        proxy_set_header Host air-cloud-msk.vercel.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        include /etc/nginx/snippets/vercel-bypass.conf;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}
