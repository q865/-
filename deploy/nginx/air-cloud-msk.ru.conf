# Reverse proxy: VPS → Vercel (после certbot)
# certbot --nginx -d air-cloud-msk.ru -d www.air-cloud-msk.ru

resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
resolver_timeout 5s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name air-cloud-msk.ru www.air-cloud-msk.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://air-cloud-msk.ru$request_uri;
    }
}

# www → apex (единый хост для Яндекса/Google)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.air-cloud-msk.ru;

    ssl_certificate /etc/letsencrypt/live/air-cloud-msk.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/air-cloud-msk.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://air-cloud-msk.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name air-cloud-msk.ru;

    ssl_certificate /etc/letsencrypt/live/air-cloud-msk.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/air-cloud-msk.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        set $upstream air-cloud-msk.vercel.app;
        proxy_pass https://$upstream;
        proxy_ssl_server_name on;
        proxy_ssl_name air-cloud-msk.vercel.app;
        proxy_http_version 1.1;
        proxy_set_header Host air-cloud-msk.vercel.app;
        proxy_set_header X-Real-IP $remote_addr;
        # Не пробрасываем клиентский XFF — иначе легко подделать IP для rate-limit
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # Vercel может перезаписать X-Forwarded-Host — отдельный заголовок для www→apex
        proxy_set_header X-Site-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        include /etc/nginx/snippets/vercel-bypass.conf;
        proxy_connect_timeout 30s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        # Буферизация HTML снижает обрывы у роботов (Яндекс/Google) при медленном upstream
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 64k;
        proxy_buffer_size 16k;
    }
}
